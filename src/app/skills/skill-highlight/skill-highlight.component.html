@if (loading()) {
  <app-loader></app-loader>
} @else if (skill()) {
  <h2>{{ skill().label }}</h2>

  <p class="description">{{ description() }}</p>

  <p class="footer">
    <mat-icon [ngClass]="{ 'material-symbols-outlined': hovered }">
      {{ skill().loved ? 'favorite' : 'school' }}
    </mat-icon>
    <span>
      {{
        'skills.skillHighlight.projects'
          | transloco: { count: skill().projects.length }
      }}
    </span>
  </p>
}
